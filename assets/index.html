<!doctype html>
<!-- Viewer UI shell. Served from https://viewer.assets/ (a WebView2 virtual
     host). <base> points at https://viewer.doc/ - the current document's
     folder - so relative links/images in rendered markdown resolve; asset
     URLs below are therefore absolute. Logic lives in app.js. -->
<html>
<head>
<meta charset="utf-8">
<!-- Document HTML model: markdown-it runs with html:true, so raw HTML in
     documents (<details>/<summary>/<kbd>/<sub>/<sup> ...) is parsed GitHub-style;
     DOMPurify sanitizes every rendered HTML string before it reaches innerHTML
     (stripping <script>, event handlers and javascript: URLs). This CSP is a
     second layer behind that sanitizer: even if a sanitizer bypass ever slipped
     through, injected script/styles would not execute and nothing could be
     exfiltrated. It also blocks remote images (tracking pixels); add https: to
     img-src if remote images should be allowed. -->
<!-- style-src allows 'unsafe-inline' because Mermaid injects <style> into the
     SVGs it generates. script-src stays locked to viewer.assets (the part that
     blocks injected JS); Mermaid runs at securityLevel:'strict' (labels
     sanitized, click/script directives disabled). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src https://viewer.assets; style-src https://viewer.assets 'unsafe-inline'; img-src https://viewer.assets https://viewer.doc data:; font-src https://viewer.assets;">
<title>Markdown Viewer</title>
<base href="https://viewer.doc/">
<link id="css-md-light" rel="stylesheet" href="https://viewer.assets/vendor/github-markdown-light.min.css" media="(prefers-color-scheme: light)">
<link id="css-md-dark"  rel="stylesheet" href="https://viewer.assets/vendor/github-markdown-dark.min.css"  media="(prefers-color-scheme: dark)">
<link id="css-hl-light" rel="stylesheet" href="https://viewer.assets/vendor/hljs-github.min.css"           media="(prefers-color-scheme: light)">
<link id="css-hl-dark"  rel="stylesheet" href="https://viewer.assets/vendor/hljs-github-dark.min.css"      media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="https://viewer.assets/vendor/katex.min.css">
<link rel="stylesheet" href="https://viewer.assets/app.css">
</head>
<body>
<!-- Back/forward history toolbar. Hidden until there is somewhere to go; the
     buttons post "back"/"forward" to the host (app.js drives both). -->
<nav id="mv-nav" hidden aria-label="History navigation">
  <button id="mv-back" class="mv-nav-btn" type="button" title="Back (Alt+Left)" aria-label="Back" disabled>
    <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M9.78 12.78a.75.75 0 0 1-1.06 0L4.47 8.53a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 1.06L6.06 8l3.72 3.72a.75.75 0 0 1 0 1.06Z"/></svg>
  </button>
  <button id="mv-fwd" class="mv-nav-btn" type="button" title="Forward (Alt+Right)" aria-label="Forward" disabled>
    <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"/></svg>
  </button>
</nav>
<main id="content" class="markdown-body"></main>
<script src="https://viewer.assets/vendor/markdown-it.min.js"></script>
<script src="https://viewer.assets/vendor/markdown-it-task-lists.min.js"></script>
<script src="https://viewer.assets/vendor/markdown-it-anchor.min.js"></script>
<script src="https://viewer.assets/vendor/highlight.min.js"></script>
<script src="https://viewer.assets/vendor/mermaid.min.js"></script>
<!-- KaTeX must load before texmath (texmath consumes it as its engine). -->
<script src="https://viewer.assets/vendor/katex.min.js"></script>
<script src="https://viewer.assets/vendor/markdown-it-texmath.min.js"></script>
<!-- DOMPurify must load before app.js: it sanitizes rendered document HTML
     (window.DOMPurify) before any innerHTML assignment. -->
<script src="https://viewer.assets/vendor/purify.min.js"></script>
<script src="https://viewer.assets/app.js"></script>
</body>
</html>
